<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURCALA TV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

  #waiting {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; height: 100%;
    background: #0f1117; color: #64748b;
    font-family: sans-serif;
  }
  .logo  { font-size: 64px; margin-bottom: 20px; }
  .title { font-size: 28px; font-weight: 600; color: #e2e8f0; margin-bottom: 10px; }
  .sub   { font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .dot   { width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }

  #player { display: none; width: 100%; height: 100%; }
  video   { width: 100%; height: 100%; object-fit: contain; background: #000; }
</style>
</head>
<body>

<div id="waiting">
  <div class="logo">📺</div>
  <div class="title">SURCALA TV</div>
  <div class="sub"><div class="dot"></div> <span id="status">Conectando...</span></div>
</div>

<div id="player">
  <video id="video" autoplay playsinline></video>
</div>

<script>
const GAS          = 'https://script.google.com/macros/s/AKfycbxPMqp9zShQhVk9G117Fl_fWBBiOrRSpZWHKO1F2B139mwQJg47l197JWx9SZ7U9-Zs/exec';
const POLL_MS      = 3000;  // consultar GAS cada 3 segundos

const waiting  = document.getElementById('waiting');
const player   = document.getElementById('player');
const video    = document.getElementById('video');
const statusEl = document.getElementById('status');

let lastCmd       = null;
let lastVideo     = null;
let lastTimestamp = null;

// ─── POLLING ──────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch(GAS + '?action=status');
    const s = await r.json();
    handleState(s);
  } catch(e) {
    statusEl.textContent = 'Sin conexión... reintentando';
  }
  setTimeout(poll, POLL_MS);
}

// ─── LÓGICA DE ESTADO ─────────────────────────────────────────────────────────
function handleState(s) {
  const cmd       = s.cmd       || 'stop';
  const videoName = s.video     || '';
  const videoUrl  = s.video_url || '';
  const timestamp = s.timestamp || '';

  // Scheduler — verificar si estamos en horario
  if (s.schedule_enabled === 'true' && cmd !== 'stop') {
    if (!isInSchedule(s)) {
      showWaiting('Fuera del horario programado');
      return;
    }
  }

  // Sin cambios — no hacer nada
  if (cmd === lastCmd && videoName === lastVideo && timestamp === lastTimestamp) return;

  lastCmd       = cmd;
  lastVideo     = videoName;
  lastTimestamp = timestamp;

  if (cmd === 'play' && videoUrl) {
    playVideo(videoUrl, parseFloat(s.position || 0), parseInt(timestamp || 0));
  } else if (cmd === 'pause') {
    video.pause();
    showPlayer();
  } else {
    showWaiting('En espera...');
  }
}

// ─── REPRODUCTOR ──────────────────────────────────────────────────────────────
function playVideo(url, position, timestamp) {
  // Calcular posición real según tiempo transcurrido desde que se dio play
  const elapsed  = timestamp ? (Date.now() - timestamp) / 1000 : 0;
  const realPos  = Math.max(0, position + elapsed);

  showPlayer();

  if (video.src !== url) {
    video.src = url;
    video.load();
    video.addEventListener('loadedmetadata', () => {
      video.currentTime = realPos;
      video.play().catch(() => { video.currentTime = 0; video.play(); });
    }, { once: true });
  } else {
    video.currentTime = realPos;
    video.play().catch(() => {});
  }

  video.onended = () => { video.currentTime = 0; video.play(); };
}

// ─── SCHEDULER ────────────────────────────────────────────────────────────────
function isInSchedule(s) {
  const now   = new Date();
  const days  = (s.schedule_days || '0,1,2,3,4').split(',').map(Number);
  const [sh, sm] = (s.schedule_start || '07:00').split(':').map(Number);
  const [eh, em] = (s.schedule_end   || '16:00').split(':').map(Number);
  const nowMin   = now.getHours() * 60 + now.getMinutes();
  const dayIdx   = now.getDay() === 0 ? 6 : now.getDay() - 1;
  return days.includes(dayIdx) && nowMin >= (sh*60+sm) && nowMin <= (eh*60+em);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function showPlayer()        { waiting.style.display = 'none';  player.style.display = 'block'; }
function showWaiting(msg)    { player.style.display  = 'none';  waiting.style.display = 'flex'; statusEl.textContent = msg || 'En espera...'; video.src = ''; }

// ─── INIT ─────────────────────────────────────────────────────────────────────
poll();
</script>
</body>
</html>
