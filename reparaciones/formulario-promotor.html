<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Solicitud de Reparación — Suralnor / Emcala</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F7FA;--card:#FFFFFF;--border:#E2E8F0;
  --navy:#0F2A4A;--blue:#1B5FA8;--accent:#0EA5E9;
  --text:#0F2A4A;--muted:#64748B;--success:#16A34A;
  --shadow-lg:0 8px 32px rgba(15,42,74,0.13);
}

/* ── BASE ── */
html{height:100%;}
body{
  font-family:'Bricolage Grotesque',sans-serif;
  min-height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  background:var(--navy);
  position:relative;
}
body::before{
  content:'';position:fixed;
  top:-20%;left:-20%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(14,165,233,0.18) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;
  bottom:-20%;right:-10%;width:40%;height:40%;
  background:radial-gradient(circle,rgba(14,165,233,0.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── CARD ── */
.form-box{
  background:white;
  border-radius:20px;
  padding:24px 36px 28px;
  width:100%;max-width:480px;
  box-shadow:var(--shadow-lg);
  position:relative;z-index:1;
  animation:formUp 0.5s ease forwards;
}
@keyframes formUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGO ── */
.form-logo{display:flex;justify-content:center;margin-bottom:14px;}
.form-logo img{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid var(--border);}

/* ── TÍTULOS ── */
.form-title{font-size:20px;font-weight:800;text-align:center;color:var(--navy);margin-bottom:2px;}
.form-desc{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px;}

/* ── CAMPOS ── */
.field{margin-bottom:10px;}
.field label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;text-align:center;
}
.req{color:#DC2626;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:15px;color:var(--text);
  background:var(--bg);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;appearance:none;
  text-align:center;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(14,165,233,0.12);
}
.field textarea{resize:vertical;min-height:72px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:14px 0;}

/* ── GEO ── */
.geo-btn{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--bg);color:var(--navy);
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.2s;
}
.geo-btn:hover{border-color:var(--accent);background:rgba(14,165,233,0.05);}
.geo-btn.loading .geo-icon{display:none;}
.geo-btn:not(.loading) .spinner{display:none;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.geo-result{margin-top:10px;font-size:13px;}
.geo-result.ok{color:var(--success);font-weight:600;}
.geo-result.err{color:#DC2626;}

/* ── SUBMIT ── */
.submit-btn{
  width:100%;padding:15px;
  background:var(--navy);color:white;
  border:none;border-radius:12px;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:16px;font-weight:700;
  cursor:pointer;margin-top:14px;
  transition:background 0.2s,transform 0.1s;
}
.submit-btn:hover{background:var(--blue);}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* ── SUCCESS ── */
.success-box{display:none;text-align:center;padding:32px 0;}
.success-box.show{display:block;}
.success-icon{font-size:56px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
.success-ot{
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:14px;
  font-family:'DM Mono',monospace;font-size:18px;
  font-weight:700;color:var(--navy);letter-spacing:0.05em;
}
.btn-nuevo{
  display:inline-block;margin-top:20px;
  padding:12px 28px;background:var(--navy);color:white;
  border:none;border-radius:10px;font-family:'Bricolage Grotesque',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background 0.2s;
}
.btn-nuevo:hover{background:var(--blue);}

/* ── TABLET ── */
@media(min-width:481px) and (max-width:768px){
  body{padding:24px 20px 40px;}
  .form-box{padding:36px 32px 44px;}
}

/* ── MOBILE — Samsung A05 / Moto E22 ── */
@media(max-width:480px){
  body{padding:16px 12px 40px;align-items:flex-start;}
  .form-box{
    border-radius:20px;
    padding:28px 20px 40px;
    max-width:100%;
    animation:none;
  }
  .form-logo img{width:72px;height:72px;}
  .form-title{font-size:18px;}
  .form-desc{font-size:12px;margin-bottom:20px;}
  .grid-2{grid-template-columns:1fr;}
  .field{margin-bottom:14px;}
  .field input,.field select,.field textarea{
    font-size:16px;padding:13px 14px;
  }
  .field label{font-size:10px;margin-bottom:6px;}
  .field textarea{min-height:80px;}
  .geo-btn{font-size:14px;padding:13px 14px;}
  .submit-btn{margin-top:20px;padding:15px;font-size:16px;}
  .divider{margin:16px 0;}
}
input,select,textarea,button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
</style>
</head>

  let extFoto = '';

  function previewFoto(input) {
    const file = input.files[0];
    if (!file) return;
    
    if (file.size > 5 * 1024 * 1024) {
      alert('❌ La imagen es demasiado grande. El tamaño máximo es 5MB.');
      input.value = '';
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      base64Foto = e.target.result.split(',')[1];
      mimeTypeFoto = file.type;
      extFoto = file.name.split('.').pop();
      
      document.getElementById('fotoPreview').src = e.target.result;
      document.getElementById('fotoPreviewContainer').style.display = 'block';
      const btn = document.getElementById('fotoBtn');
      btn.innerHTML = `
        <svg class="geo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--success);">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Foto Seleccionada
      `;
      btn.style.borderColor = 'var(--success)';
      btn.style.color = 'var(--success)';
    };
    reader.readAsDataURL(file);
  }

  function clearFoto() {
    document.getElementById('fotoInput').value = '';
    document.getElementById('fotoPreview').src = '';
    document.getElementById('fotoPreviewContainer').style.display = 'none';
    base64Foto = '';
    mimeTypeFoto = '';
    extFoto = '';
    const btn = document.getElementById('fotoBtn');
    btn.innerHTML = `
      <svg class="geo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted);">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Seleccionar Foto
    `;
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--navy)';
  }

  async function verificarCliente(codigo) {
    const feedback = document.getElementById('clienteFeedback');
    codigo = (codigo || '').trim();
    if (!codigo) {
      feedback.textContent = '';
      clienteValido = false;
      return;
    }
    feedback.style.color = 'var(--muted)';
    feedback.textContent = '🔍 Buscando cliente...';
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'buscarCliente', cliente: codigo })
      });
      const data = await response.json();
      if (data.encontrado) {
        feedback.style.color = 'var(--success)';
        feedback.textContent = '👤 ' + data.nombre + (data.localidad ? ' (' + data.localidad + ')' : '');
        clienteValido = true;
        document.getElementById('codigoCliente').style.borderColor = '';
      } else {
        feedback.style.color = '#DC2626';
        feedback.textContent = '❌ Código no encontrado en Suralnor';
        clienteValido = false;
      }
    } catch (e) {
      console.error(e);
      feedback.style.color = '#D97706';
      feedback.textContent = '⚠️ No se pudo verificar (sin conexión)';
      clienteValido = true; // permitimos guardar de todos modos ante falla de red
    }
  }

  async function cargarPromotores() {
    const select = document.getElementById('promotor');
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'getPromotores' })
      });
      const data = await response.json();
      if (data.promotores && data.promotores.length > 0) {
        const currentSelected = select.value;
        select.innerHTML = '<option value="" disabled selected>Seleccionar promotor...</option>';
        data.promotores.forEach(p => {
          const opt = document.createElement('option');
          opt.textContent = p;
          opt.value = p;
          select.appendChild(opt);
        });
        if (currentSelected) select.value = currentSelected;
      }
    } catch (e) {
      console.error('Error al cargar promotores:', e);
    }
  }

  function toggleSinEdf(checkbox) {
    const edfInput = document.getElementById('edf');
    if (checkbox.checked) {
      edfInput.value = 'SIN EDF';
      edfInput.disabled = true;
      edfInput.style.opacity = '0.5';
    } else {
      edfInput.value = '';
      edfInput.disabled = false;
      edfInput.style.opacity = '1';
    }
  }

  function geolocate() {
    const btn = document.getElementById('geoBtn');
    const result = document.getElementById('geoResult');

    if (!navigator.geolocation) {
      result.className = 'geo-result err';
      result.innerHTML = '✕ Tu navegador no soporta geolocalización.';
      return;
    }

    btn.classList.add('loading');
    result.className = 'geo-result';

    let bestPos = null;
    let readings = 0;
    const MAX_READINGS = 4;
    const MIN_ACCURACY = 50; // metros — si llegamos a esto, paramos antes
    let watchId = null;
    let timeoutId = null;

    function updateBtn(msg) {
      const span = btn.querySelector('span');
      if (span) span.textContent = msg;
    }

    function done(pos) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      const lat = pos.coords.latitude.toFixed(6).replace(',','.');
      const lng = pos.coords.longitude.toFixed(6).replace(',','.');
      const acc = Math.round(pos.coords.accuracy);
      geoData = { lat, lng, acc };
      document.getElementById('latitud').value = lat;
      document.getElementById('longitud').value = lng;

      btn.classList.remove('loading');

      // Color del indicador según precisión
      const accColor = acc <= 20 ? 'var(--success)' : acc <= 50 ? '#D97706' : 'var(--error)';
      const accLabel = acc <= 20 ? 'Muy preciso' : acc <= 50 ? 'Aceptable' : 'Baja precisión';

      result.className = 'geo-result ok';
      result.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <div>
          Ubicación capturada
          <span class="geo-coords">Lat: ${lat} | Lng: ${lng}</span>
          <span style="display:block;margin-top:3px;font-size:11px;font-weight:700;color:${accColor}">
            ± ${acc}m · ${accLabel}
          </span>
        </div>`;
    }

    function fail(err) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      // Si ya teníamos algo, usarlo igual
      if (bestPos) { done(bestPos); return; }

      btn.classList.remove('loading');
      result.className = 'geo-result err';
      const msgs = {
        1: 'Permiso denegado. Habilitá la ubicación en Configuración.',
        2: 'No se pudo obtener ubicación. Verificá que el GPS esté activo.',
        3: 'Tiempo agotado. Intentá en un lugar más abierto.'
      };
      result.innerHTML = `✕ ${msgs[err.code] || 'Error desconocido. Intentá de nuevo.'}`;
    }

    // Usamos watchPosition para tomar varias lecturas y quedarnos con la mejor
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        readings++;
        updateBtn(`Mejorando precisión... (${readings}/${MAX_READINGS})`);

        if (!bestPos || pos.coords.accuracy < bestPos.coords.accuracy) {
          bestPos = pos;
        }

        // Parar si llegamos a buena precisión o al máximo de lecturas
        if (pos.coords.accuracy <= MIN_ACCURACY || readings >= MAX_READINGS) {
          done(bestPos);
        }
      },
      fail,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );

    // Timeout total de 20 segundos
    timeoutId = setTimeout(() => {
      if (bestPos) { done(bestPos); }
      else { fail({ code: 3 }); }
    }, 20000);
  }

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';

  document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fields = [
      { id: 'promotor', label: 'Promotor' },
      { id: 'codigoCliente', label: 'Código de Cliente' },
      { id: 'tipoLogo', label: 'Tipo de Logo' },
      { id: 'edf', label: 'EDF' },
      { id: 'fallaSugerida', label: 'Falla Sugerida' },
    ];

    let valid = true;
    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el.value.trim()) {
        el.style.borderColor = 'var(--error)';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
        valid = false;
        el.addEventListener('input', () => {
          el.style.borderColor = '';
          el.style.boxShadow = '';
        }, { once: true });
      }
    });

    if (valid) {
      const edfInput = document.getElementById('edf');
      const isSinEdf = document.getElementById('sinEdf').checked;
      if (!isSinEdf) {
        const edfVal = edfInput.value.trim().replace(/\s/g, '');
        if (!/^\d{5,12}$/.test(edfVal)) {
          edfInput.style.borderColor = 'var(--error)';
          edfInput.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
          alert('⚠️ El número de EDF debe ser numérico y tener entre 5 y 12 dígitos.\nSi el equipo no tiene número de EDF / Activo Fijo, marcá la casilla correspondiente.');
          valid = false;
          edfInput.addEventListener('input', () => {
            edfInput.style.borderColor = '';
            edfInput.style.boxShadow = '';
          }, { once: true });
        }
      }
    }

    if (valid) {
      if (!clienteValido) {
        alert('⚠️ Por favor, ingresá un código de cliente válido de Suralnor.');
        const el = document.getElementById('codigoCliente');
        el.style.borderColor = 'var(--error)';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
        valid = false;
        el.addEventListener('input', () => {
          el.style.borderColor = '';
          el.style.boxShadow = '';
        }, { once: true });
      }
    }

    if (!valid) {
      const firstErr = document.querySelector('[style*="error"]');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const payload = {
      timestamp: new Date().toISOString(),
      promotor: document.getElementById('promotor').value,
      rol: 'promotor',
      cliente: document.getElementById('codigoCliente').value,
      marca: document.getElementById('tipoLogo').value,
      edf: document.getElementById('edf').value,
      falla: document.getElementById('fallaSugerida').value,
      lat: geoData ? geoData.lat : '',
      lng: geoData ? geoData.lng : '',
      foto: '',
      fotoBase64: base64Foto,
      fotoMimeType: mimeTypeFoto,
      fotoExtension: extFoto,
      notas: ''
    };

    // Anti-duplicado: verificar si el mismo payload fue enviado en los últimos 60 segundos
    const payloadHash = [payload.promotor, payload.cliente, payload.marca, payload.edf, payload.falla].join('|');
    const now = Date.now();
    if (payloadHash === lastSubmitHash && (now - lastSubmitTime) < 60000) {
      alert('⚠️ Esta solicitud ya fue enviada hace menos de 1 minuto.\nEsperá antes de reenviar.');
      return;
    }

    // Deshabilitar botón y mostrar estado de carga
    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';

    const summary = `
PROMOTOR: ${payload.promotor}
CÓDIGO CLIENTE: ${payload.cliente}
MARCA HELADERA: ${payload.marca}
EDF: ${payload.edf}
FALLA SUGERIDA: ${payload.falla}
UBICACIÓN: ${geoData ? `Lat ${geoData.lat}, Lng ${geoData.lng}` : 'No capturada'}
    `.trim();

    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      // Guardar hash para prevenir duplicados
      lastSubmitHash = payloadHash;
      lastSubmitTime = Date.now();

      // Mostrar éxito con número de OT real
      document.getElementById('otNumber').textContent = 'OT ' + (result.ot || '—');
      document.getElementById('summaryText').textContent = summary;
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('successOverlay').classList.add('show');

    } catch (err) {
      console.error('Error al enviar:', err);
      // Fallback: en muchos casos la solicitud SÍ llegó pero CORS bloqueó la respuesta
      lastSubmitHash = payloadHash;
      lastSubmitTime = Date.now();

      document.getElementById('otNumber').textContent = 'Enviado ✓';
      document.getElementById('summaryText').textContent = summary + '\n\n⚠️ No se pudo confirmar el número de OT.\nLa solicitud fue enviada igualmente.';
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('successOverlay').classList.add('show');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enviar Registro →';
    }
  });

  function resetForm() {
    document.getElementById('mainForm').reset();
    clearFoto();
    clienteValido = false;
    document.getElementById('clienteFeedback').textContent = '';

    const edfInput = document.getElementById('edf');
    edfInput.disabled = false;
    edfInput.style.opacity = '1';
    const sinEdfCheckbox = document.getElementById('sinEdf');
    if (sinEdfCheckbox) sinEdfCheckbox.checked = false;

    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('formContent').style.display = 'block';
    document.getElementById('geoResult').className = 'geo-result';
    geoData = null;
    // Reiniciar GPS al limpiar
    setTimeout(() => geolocate(), 500);
  }

  // Iniciar GPS automáticamente al cargar
  window.addEventListener('load', () => {
    cargarPromotores();
    setTimeout(() => geolocate(), 600);
  });
</script>
