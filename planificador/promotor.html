<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>App Promotor · EMCALA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: linear-gradient(145deg,#0B2559 0%,#1B5FA8 60%,#0D3880 100%);
      --surf: #ffffff;
      --brd: #e2e8f0;
      --acc: #1B5FA8;
      --acc-hover: #14467d;
      --txt: #0f172a;
      --muted: #64748b;
      --foco1: #ef4444; /* Cervezas */
      --foco2: #0ea5e9; /* NABS */
      --foco3: #eab308; /* KPI 1 */
      --foco4: #8b5cf6; /* KPI 2 */
      --shad: 0 20px 40px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { background: var(--bg); color: var(--txt); font-family: 'Bricolage Grotesque', sans-serif; min-height: 100vh; padding-bottom: 40px; }

    .hdr { background: rgba(255,255,255,0.12); border-bottom: 1px solid rgba(255,255,255,0.22); padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); display:flex; justify-content:center; align-items:center; }
    .hdr h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 26px; color: #fff; text-transform: uppercase; letter-spacing: -0.02em; margin:0; }
    .hdr h1 span { color: rgba(255,255,255,0.6); font-weight: 600; font-size: 22px; }

    .container { padding: 16px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.6s ease-out; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 24px; box-shadow: var(--shad); border-top: 4px solid var(--acc); text-align: center; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 24px 48px rgba(0,0,0,0.12); }
    .card.foco1 { border-top-color: var(--foco1); }
    .card.foco2 { border-top-color: var(--foco2); }
    .card.foco3 { border-top-color: var(--foco3); }
    .card.foco4 { border-top-color: var(--foco4); }

    .card-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 20px; font-weight: 800; text-transform: uppercase; color: var(--txt); margin-bottom: 20px; letter-spacing: -0.03em; }

    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-weight: 700; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: 0.05em; text-align: center; }

    select, input[type="number"], input[type="date"] {
      width: 100%; padding: 14px; border: 1px solid transparent; border-radius: 12px; font-family: 'Bricolage Grotesque', sans-serif; font-size: 16px; font-weight: 600; color: var(--txt); background: #f1f5f9; outline: none; transition: all 0.3s ease; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    select:focus, input:focus { background: #fff; border-color: var(--acc); box-shadow: 0 0 0 4px rgba(27, 95, 168, 0.15); }
    select:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; opacity: 0.7; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-submit { background: linear-gradient(135deg, #2563eb, #1e40af); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 16px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 24px rgba(37, 99, 235, 0.3); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 12px; letter-spacing: -0.02em; }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(37, 99, 235, 0.4); }
    .btn-submit:disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; box-shadow: none; transform: none; }

    #loading { text-align: center; font-weight: 600; color: #e2e8f0; margin-top: 12px; display: none; font-size: 15px; }
    
    .global-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }

    .success-msg { 
      display: none; 
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      z-index: 1000;
      background: linear-gradient(135deg, #10b981, #059669); 
      color: white; 
      padding: 16px; 
      border-radius: 16px; 
      text-align: center; 
      font-weight: 800; 
      font-size: 16px; 
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); 
      animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

    .kpi-fixed-text { font-size: 15px; font-weight: 800; color: #065f46; padding: 12px; background: linear-gradient(to right, #ecfdf5, #d1fae5); border-radius: 12px; border: 1px solid #a7f3d0; text-align: center; }
    .kpi-pending-text { font-size: 14px; font-weight: 600; color: #991b1b; padding: 14px; background: linear-gradient(to right, #fef2f2, #fee2e2); border-radius: 12px; border: 1px solid #fecaca; text-align: center; }

    .focos-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; text-align: center; }
    @media (min-width: 480px) {
      .focos-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div id="global-overlay" class="global-overlay">
    <div class="spinner" id="overlay-spinner"></div>
    <div class="overlay-text" id="overlay-text">Procesando...</div>
  </div>

  <div class="hdr">
    <div>
      <h1>EMCALA <span>| Mi Planificación</span></h1>
    </div>
  </div>

  <div class="container">
    
    <!-- IDENTIFICACION -->
    <div class="card">
      <div class="card-title">👤 Identificación</div>
      <div class="form-group">
        <label>Fecha a planificar</label>
        <input type="date" id="date-input" required>
      </div>
      <div class="form-group">
        <label>Supervisor</label>
        <select id="spv-select">
          <option value="">Selecciona tu supervisor...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Promotor</label>
        <select id="prom-select" disabled>
          <option value="">Selecciona tu nombre...</option>
        </select>
      </div>
    </div>

    <!-- FOCOS 1 A 4 EN GRID RESPONSIVO -->
    <div class="focos-grid">
      
      <!-- FOCO 1 -->
      <div class="card foco1" style="padding: 16px; margin-bottom: 0; position: relative; overflow: hidden;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Quilmes_Logo.svg" alt="Quilmes" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 120px; opacity: 0.15; pointer-events: none; z-index: 0;">
        <div class="card-title" style="color:var(--foco1); font-size: 18px; margin-bottom: 12px; position: relative; z-index: 1;">Cervezas</div>
        <div class="form-group" style="margin-bottom: 0; position: relative; z-index: 1;">
          <label style="font-size: 13px; margin-bottom: 8px;">Total Plan (HL)</label>
          <input type="number" id="f1-total" step="0.01" placeholder="0.00" style="padding: 12px; font-size: 18px; text-align: center; position: relative; z-index: 2;">
        </div>
      </div>
      
      <!-- FOCO 2 -->
      <div class="card foco2" style="padding: 16px; margin-bottom: 0; position: relative; overflow: hidden;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Pepsi_logo_2014.svg" alt="Pepsi" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 120px; opacity: 0.15; pointer-events: none; z-index: 0;">
        <div class="card-title" style="color:var(--foco2); font-size: 18px; margin-bottom: 12px; position: relative; z-index: 1;">NABS</div>
        <div class="form-group" style="margin-bottom: 0; position: relative; z-index: 1;">
          <label style="font-size: 13px; margin-bottom: 8px;">Total Plan (HL)</label>
          <input type="number" id="f2-total" step="0.01" placeholder="0.00" style="padding: 12px; font-size: 18px; text-align: center; position: relative; z-index: 2;">
        </div>
      </div>
      
      <!-- FOCO 3 -->
      <div class="card foco3" style="padding: 16px; margin-bottom: 0;">
        <div class="card-title" style="color:var(--foco3); font-size: 18px; margin-bottom: 12px;">🎯 KPI 1</div>
        <div id="kpi1-container">
          <div class="kpi-pending-text">Elegí supervisor...</div>
        </div>
      </div>
  
      <!-- FOCO 4 -->
      <div class="card foco4" style="padding: 16px; margin-bottom: 0;">
        <div class="card-title" style="color:var(--foco4); font-size: 18px; margin-bottom: 12px;">🎯 KPI 2</div>
        <div id="kpi2-container">
          <div class="kpi-pending-text">Elegí supervisor...</div>
        </div>
      </div>
      
    </div>

    <!-- FOCO 5 (BOLETAS) -->
    <div class="card foco5" style="border-top-color: #f97316;">
      <div class="card-title" style="color:#f97316">🧾 Boletas</div>
      <div class="form-group">
        <label>Cantidad Planificada</label>
        <input type="number" id="bol-total" step="1" placeholder="0">
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" disabled>Enviar Planificación</button>
    <div id="loading">Consultando datos del supervisor...</div>
    <div class="success-msg" id="success-msg">¡Planificación enviada con éxito!</div>

  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzePqSmRPZhZJ9LPg6dWr50lf_uGvX8Tt09hbwqKiYJVOa8jt85lyGKRReZ-c_OxMcAcg/exec';

    const SPV_DATA = {
      'AVILA EZEQUIEL': ['FERNANDEZ LUIS','THEILLET NICOLAS','JAIMES EZEQUIEL','MOURELLE ALFREDO','PEREYRA BRAIAN','SAN JUAN CARLOS','SANTILLAN SERGIO','TESEI ALEJANDRA','TORRES KARINA'],
      'ARES PEDRO': ['GALLO JONATHAN','DIAZ VALERIA','FERREYRA LEONARDO','MIÑO RENZO','LOPEZ PABLO','SANCHEZ ROCIO'],
      'ECEIZA KEVIN': ['DOMINGUEZ GONZALO','GEREZ JONATHAN','GONZALEZ ROBERTO','JOFRE LUCAS','GUARAZ JUAN','MENDOZA SERGIO','MUÑOZ PAULA','REGNER LEANDRO','SCORNAVACHE WALTER'],
      'RIERA SALA DANIELA': ['ASCONA MATIAS','BENITEZ NAHUEL','CESPEDES ENZO','FERREYRA TOBIAS','FREDES CLAUDIA','GARCIA MAIRA','LEITES RODRIGO','LOPEZ ALEJANDRA','MORENO AGUSTINA'],
      'BDR': ['ANDUAGA SANTIAGO','GOMEZ GUSTAVO','VEDIA ELIZABETH'],
      'LEMOS PATRICIA': ['LEMOS PATRICIA']
    };

    const spvSelect = document.getElementById('spv-select');
    const promSelect = document.getElementById('prom-select');
    const dateInput = document.getElementById('date-input');
    const btnSubmit = document.getElementById('btn-submit');
    const loading = document.getElementById('loading');

    function showOverlay(msg) {
      document.getElementById('overlay-text').textContent = msg;
      document.getElementById('global-overlay').style.display = 'flex';
    }
    function hideOverlay() {
      document.getElementById('global-overlay').style.display = 'none';
    }

    // Poblar supervisores
    for (const spv in SPV_DATA) {
      const opt = document.createElement('option');
      opt.value = spv; opt.textContent = spv;
      spvSelect.appendChild(opt);
    }

    // Setear fecha actual
    function setTodayDate() {
      const _now = new Date();
      return `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
    }
    dateInput.value = setTodayDate();

    // Estado global de los KPIs
    let currentKpiData = null;

    spvSelect.addEventListener('change', () => {
      const spv = spvSelect.value;
      const isLemos = spv === 'LEMOS PATRICIA';
      document.querySelector('.foco3').style.display = isLemos ? 'none' : '';
      document.querySelector('.foco4').style.display = isLemos ? 'none' : '';
      document.querySelector('.foco5').style.display = isLemos ? 'none' : '';

      promSelect.innerHTML = '<option value="">Selecciona tu nombre...</option>';
      if (spv) {
        SPV_DATA[spv].forEach(p => {
          const opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          promSelect.appendChild(opt);
        });
        promSelect.disabled = false;
        loadKpis();
      } else {
        promSelect.disabled = true;
        currentKpiData = null;
        renderKpis();
      }
    });

    dateInput.addEventListener('change', () => {
      if(spvSelect.value) {
        loadKpis();
      }
    });

    async function loadKpis() {
      const date = dateInput.value;
      const spv = spvSelect.value;
      if (!date || !spv) return;

      currentKpiData = null;
      btnSubmit.disabled = true;
      showOverlay('Buscando FOCOS KPI del supervisor...');

      document.getElementById('kpi1-container').innerHTML = `<div class="kpi-pending-text">Sincronizando...</div>`;
      document.getElementById('kpi2-container').innerHTML = `<div class="kpi-pending-text">Sincronizando...</div>`;

      try {
        // En Apps Script no podemos enviar cabeceras personalizadas (provoca error CORS)
        const response = await fetch(`${SCRIPT_URL}?date=${date}&spv=${encodeURIComponent(spv)}&_t=${Date.now()}`, {
          cache: 'no-store'
        });
        const result = await response.json();
        
        // Aplicar parche de codificación para MIÑO RENZO
        if (result.status === 'success' && result.data) {
          let patchedData = {};
          for (let originalProm in result.data) {
            let prom = originalProm;
            if (prom.includes('RENZO') && (prom.includes('MI') || prom.includes('MINO'))) {
              prom = 'MIÑO RENZO';
            }
            patchedData[prom] = result.data[originalProm];
          }
          result.data = patchedData;
          
          // Buscamos cualquier registro que tenga configurado k1-met
          let foundKpi = false;
          for (let key in result.data) {
            const d = result.data[key];
            if (d['k1-met'] && d['k1-tar']) {
              currentKpiData = {
                k1m: d['k1-met'], k1t: d['k1-tar'],
                k2m: d['k2-met'], k2t: d['k2-tar']
              };
              foundKpi = true;
              break;
            }
          }
        }
        renderKpis();
      } catch (e) {
        console.error(e);
        const msg = `<div class="kpi-pending-text">Error de conexión al buscar los KPIs.</div>`;
        document.getElementById('kpi1-container').innerHTML = msg;
        document.getElementById('kpi2-container').innerHTML = msg;
      } finally {
        hideOverlay();
      }
    }

    function renderKpis() {
      if (currentKpiData) {
        document.getElementById('kpi1-container').innerHTML = `
          <div class="kpi-fixed-text">${currentKpiData.k1m}: ${currentKpiData.k1t}</div>
          <div class="form-group" style="margin-top:12px; margin-bottom:0;">
            <label style="font-size: 13px; margin-bottom: 8px;">Plan</label>
            <input type="number" id="kpi1-p" step="0.01" placeholder="0.00" style="padding: 12px; font-size: 18px; text-align: center;">
          </div>
        `;
        document.getElementById('kpi2-container').innerHTML = `
          <div class="kpi-fixed-text">${currentKpiData.k2m}: ${currentKpiData.k2t}</div>
          <div class="form-group" style="margin-top:12px; margin-bottom:0;">
            <label style="font-size: 13px; margin-bottom: 8px;">Plan</label>
            <input type="number" id="kpi2-p" step="0.01" placeholder="0.00" style="padding: 12px; font-size: 18px; text-align: center;">
          </div>
        `;
        document.getElementById('kpi1-p').oninput = checkForm;
        document.getElementById('kpi2-p').oninput = checkForm;
        checkForm();
      } else {
        const msg = `<div class="kpi-pending-text">${spvSelect.value ? 'El supervisor aún no ha definido los FOCOS KPI para esta fecha.' : 'Elegí tu supervisor para ver el KPI...'}</div>`;
        document.getElementById('kpi1-container').innerHTML = msg;
        document.getElementById('kpi2-container').innerHTML = msg;
        btnSubmit.disabled = true;
      }
    }

    function checkForm() {
      const isLemos = spvSelect.value === 'LEMOS PATRICIA';

      if (!spvSelect.value || !promSelect.value || (!currentKpiData && !isLemos)) {
        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Enviar Planificación';
        return;
      }

      const f1 = document.getElementById('f1-total')?.value.trim() || '';
      const f2 = document.getElementById('f2-total')?.value.trim() || '';
      const k1 = document.getElementById('kpi1-p')?.value.trim() || '';
      const k2 = document.getElementById('kpi2-p')?.value.trim() || '';
      const bol = document.getElementById('bol-total')?.value.trim() || '';
      
      let missing = [];
      if (f1 === '') missing.push('Cervezas');
      if (f2 === '') missing.push('NABS');
      
      if (!isLemos) {
        if (k1 === '') missing.push('KPI 1');
        if (k2 === '') missing.push('KPI 2');
        if (bol === '') missing.push('Boletas');
      }

      if (missing.length === 0) {
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Enviar Planificación';
      } else {
        btnSubmit.disabled = true;
        const totalCampos = isLemos ? 2 : 5;
        if (missing.length === totalCampos) {
          btnSubmit.textContent = `Faltan llenar los ${totalCampos} campos`;
        } else if (missing.length > 2) {
          btnSubmit.textContent = `Faltan llenar ${missing.length} campos`;
        } else {
          btnSubmit.textContent = 'Falta: ' + missing.join(' y ');
        }
      }
    }

    promSelect.addEventListener('change', checkForm);
    document.getElementById('f1-total').addEventListener('input', checkForm);
    document.getElementById('f2-total').addEventListener('input', checkForm);
    document.getElementById('bol-total').addEventListener('input', checkForm);

    btnSubmit.addEventListener('click', async () => {
      const isLemos = spvSelect.value === 'LEMOS PATRICIA';
      if (!currentKpiData && !isLemos) {
        alert('No hay KPIs definidos para hoy.'); return;
      }
      if (!promSelect.value) {
        alert('Por favor selecciona tu nombre.'); return;
      }

      const payload = {
        date: dateInput.value,
        spv: spvSelect.value,
        promotor: promSelect.value,
        'f1-p': document.getElementById('f1-total').value || '',
        'f2-p': document.getElementById('f2-total').value || '',
        'k1-met': currentKpiData ? currentKpiData.k1m : '',
        'k1-tar': currentKpiData ? currentKpiData.k1t : '',
        'k1-p': (!isLemos && document.getElementById('kpi1-p')) ? document.getElementById('kpi1-p').value : '',
        'k2-met': currentKpiData ? currentKpiData.k2m : '',
        'k2-tar': currentKpiData ? currentKpiData.k2t : '',
        'k2-p': (!isLemos && document.getElementById('kpi2-p')) ? document.getElementById('kpi2-p').value : '',
        'bol-p': (!isLemos && document.getElementById('bol-total')) ? document.getElementById('bol-total').value : ''
      };

      const success = document.getElementById('success-msg');
      btnSubmit.disabled = true; 
      showOverlay('Enviando planificación, por favor esperá...');
      success.style.display = 'none';

      try {
        // En Apps Script no podemos enviar cabeceras personalizadas adicionales al Content-Type
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          cache: 'no-store',
          body: JSON.stringify(payload),
          headers: { 
            'Content-Type': 'text/plain;charset=utf-8'
          }
        });
        const result = await response.json();
        if (result.status === 'success') {
          hideOverlay();
          success.style.display = 'block';
          document.getElementById('f1-total').value = '';
          document.getElementById('f2-total').value = '';
          if (document.getElementById('kpi1-p')) document.getElementById('kpi1-p').value = '';
          if (document.getElementById('kpi2-p')) document.getElementById('kpi2-p').value = '';
          if (document.getElementById('bol-total')) document.getElementById('bol-total').value = '';
          promSelect.value = ''; // Reset promotor
          checkForm();
          window.scrollTo(0, 0);
          setTimeout(() => { success.style.display = 'none'; }, 5000);
        } else { alert('Error del servidor: ' + (result.message || 'Desconocido')); }
      } catch (e) {
        hideOverlay();
        alert('Hubo un error de conexión.');
      } finally {
        hideOverlay();
        checkForm(); // Re-evaluar btn estado
      }
    });
  </script>
</body>
</html>
