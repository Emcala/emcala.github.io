<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Cuentas · EMCALA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: #0f172a;
      --surf: #1e293b;
      --brd: #334155;
      --acc: #1B5FA8;
      --txt: #f8fafc;
      --muted: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
      --shad: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { background: var(--bg); color: var(--txt); font-family: 'Bricolage Grotesque', sans-serif; min-height: 100vh; padding-bottom: 40px; }

    .hdr { background: rgba(30,41,59,0.5); border-bottom: 1px solid var(--brd); padding: 20px; display:flex; justify-content:space-between; align-items:center; }
    .hdr h1 { font-weight: 800; font-size: 20px; color: #fff; text-transform: uppercase; margin:0; }
    .hdr h1 span { color: var(--muted); font-weight: 600; }

    .container { padding: 24px; max-width: 1000px; margin: 0 auto; }

    .card { background: var(--surf); border-radius: 12px; padding: 24px; box-shadow: var(--shad); border: 1px solid var(--brd); margin-bottom: 24px; }
    
    .btn { background: var(--acc); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn.danger { background: var(--red); }
    .btn.outline { background: transparent; border: 1px solid var(--brd); color: var(--txt); }

    .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

    /* Admin Auth Box */
    .admin-auth-box { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); padding: 16px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
    .admin-auth-box input { background: #0f172a; border: 1px solid var(--brd); padding: 8px 12px; border-radius: 6px; color: #fff; font-family: inherit; outline: none; width: 200px; }

    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 12px; border-bottom: 2px solid var(--brd); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 16px 12px; border-bottom: 1px solid var(--brd); font-size: 14px; font-weight: 600; }
    
    .badge { padding: 4px 8px; border-radius: 100px; font-size: 11px; font-weight: 800; background: #334155; color: #fff; text-transform: uppercase; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 999; }
    .modal { background: var(--surf); padding: 24px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid var(--brd); }
    .modal h2 { margin-bottom: 20px; font-size: 18px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .form-group input, .form-group select { width: 100%; background: #0f172a; border: 1px solid var(--brd); padding: 12px; border-radius: 8px; color: #fff; font-family: inherit; font-weight: 600; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--acc); }

    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    
    #loading { text-align: center; color: var(--muted); padding: 40px; font-weight: 600; }

    .nav-link { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .nav-link:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="hdr">
    <div style="display: flex; align-items: center; gap: 16px;">
      <a href="index.html" class="nav-link">← Volver al Portal</a>
      <h1>EMCALA <span>| Gestión de Cuentas</span></h1>
    </div>
    <div id="userBadgeContainer"></div>
  </div>

  <div class="container">
    <div class="card">
      <div class="admin-auth-box">
        <span style="font-size: 20px;">🔐</span>
        <div>
          <div style="font-size: 13px; font-weight: 700; margin-bottom: 4px;">Autorización Requerida</div>
          <div style="font-size: 11px; color: var(--muted);">Para hacer modificaciones, ingresa tu contraseña actual de administrador.</div>
        </div>
        <input type="password" id="admin-pass" placeholder="Tu contraseña...">
      </div>

      <div class="flex-between">
        <h2 style="font-size: 18px;">Usuarios del Sistema</h2>
        <button class="btn" onclick="openModal()">+ Nueva Cuenta</button>
      </div>

      <div id="loading">Cargando usuarios...</div>
      <table id="users-table" style="display:none;">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Nombre Visible</th>
            <th>Rol</th>
            <th style="text-align: right;">Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-users"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Form -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modal-title">Nueva Cuenta</h2>
      <input type="hidden" id="is-edit" value="false">
      <input type="hidden" id="target-user" value="">
      
      <div class="form-group">
        <label>Usuario (Login)</label>
        <input type="text" id="m-user" placeholder="Ej: ANALISTA">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="text" id="m-pass" placeholder="•••••••• (dejar vacío si no quieres cambiarla)">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="m-rol">
          <option value="auditor">Auditor (Máxima Autoridad)</option>
          <option value="supervisor">Supervisor</option>
          <option value="trade">Trade Marketing</option>
          <option value="tecnico">Técnico</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nombre Visible (Label)</label>
        <input type="text" id="m-nombre" placeholder="Ej: Juan Perez">
      </div>

      <div class="modal-footer">
        <button class="btn outline" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="btn-save" onclick="saveUser()">Guardar Cuenta</button>
      </div>
    </div>
  </div>

  <script src="../emcala-auth.js"></script>
  <!-- 
  IMPORTANTE: Hasta que no actualicemos la URL del SCRIPT_URL global en el index.html
  pondremos la URL en una constante local para las peticiones de este panel.
  -->
  <script>
    if (!EmcalaAuth.requireRole(['auditor'])) {
      throw new Error("No autorizado");
    }
    EmcalaAuth.renderUserBadge('userBadgeContainer');
    
    const session = EmcalaAuth.getSession();
    
    // ⚠️ REEMPLAZAR POR LA NUEVA URL DEL GOOGLE APPS SCRIPT CUANDO ESTÉ LISTO
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtaLF6l7f_UEj8ypCZV_4LoPKJtgH44e5hvPxPceu7Ya_lI_WM3eaWqd2iSUJfEFfIzw/exec';

    async function fetchAPI(payload) {
      const apass = document.getElementById('admin-pass').value;
      if (!apass && payload.action !== 'login') {
        alert('Debes ingresar tu contraseña de admin arriba.');
        return null;
      }
      payload.admin_user = session.usuario;
      payload.admin_pass = apass;

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const data = await res.json();
        if (!data.ok) {
          alert('Error: ' + data.error);
          return null;
        }
        return data;
      } catch (err) {
        alert('Error de conexión con el servidor.');
        return null;
      }
    }

    async function loadUsers() {
      // Como el GET requiere admin_user y admin_pass en este backend_auth.gs, 
      // pediremos la contraseña para cargar si el script lo exige, 
      // o modificamos backend_auth para que `get_users` solo pida el sessionToken si lo tuviéramos.
      // Dado que backend_auth pide siempre user y pass, usaremos un truco o exigimos la pass al cargar.
      
      const apass = document.getElementById('admin-pass').value;
      if (!apass) {
        document.getElementById('loading').innerHTML = 'Ingresa tu contraseña arriba para ver los usuarios.';
        document.getElementById('users-table').style.display = 'none';
        return;
      }

      document.getElementById('loading').innerHTML = 'Cargando...';
      const data = await fetchAPI({ action: 'get_users' });
      if (data) {
        renderTable(data.users);
      } else {
        document.getElementById('loading').innerHTML = 'Error al cargar (¿Contraseña incorrecta?)';
      }
    }

    document.getElementById('admin-pass').addEventListener('change', loadUsers);

    function renderTable(users) {
      const tbody = document.getElementById('tbody-users');
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.usuario}</td>
          <td>${u.nombre}</td>
          <td><span class="badge">${u.rol}</span></td>
          <td style="text-align:right; gap:8px; display:flex; justify-content:flex-end;">
            <button class="btn outline" style="padding:4px 8px;" onclick="editUser('${u.usuario}', '${u.nombre}', '${u.rol}')">Editar</button>
            <button class="btn danger" style="padding:4px 8px;" onclick="deleteUser('${u.usuario}')">Borrar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('loading').style.display = 'none';
      document.getElementById('users-table').style.display = 'table';
    }

    function openModal() {
      document.getElementById('is-edit').value = 'false';
      document.getElementById('modal-title').textContent = 'Nueva Cuenta';
      document.getElementById('m-user').value = '';
      document.getElementById('m-user').disabled = false;
      document.getElementById('m-pass').value = '';
      document.getElementById('m-nombre').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function editUser(user, nombre, rol) {
      document.getElementById('is-edit').value = 'true';
      document.getElementById('target-user').value = user;
      document.getElementById('modal-title').textContent = 'Editar Cuenta: ' + user;
      
      document.getElementById('m-user').value = user;
      document.getElementById('m-user').disabled = true; // No se cambia el ID
      document.getElementById('m-pass').value = '';
      document.getElementById('m-rol').value = rol.toLowerCase();
      document.getElementById('m-nombre').value = nombre;
      
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function saveUser() {
      const isEdit = document.getElementById('is-edit').value === 'true';
      const u = document.getElementById('m-user').value.trim();
      const p = document.getElementById('m-pass').value.trim();
      const r = document.getElementById('m-rol').value;
      const n = document.getElementById('m-nombre').value.trim();

      if (!u || (!p && !isEdit) || !r || !n) {
        alert('Completá los campos obligatorios'); return;
      }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      let payload = {};
      if (isEdit) {
        const target = document.getElementById('target-user').value;
        payload = { action: 'update_user', target_user: target, new_password: p, new_rol: r, new_nombre: n };
      } else {
        payload = { action: 'create_user', new_user: u, new_password: p, new_rol: r, new_nombre: n };
      }

      const res = await fetchAPI(payload);
      if (res) {
        closeModal();
        loadUsers();
      }
      
      btn.disabled = false;
      btn.textContent = 'Guardar Cuenta';
    }

    async function deleteUser(user) {
      if (!confirm('¿Seguro que deseas eliminar la cuenta ' + user + '?')) return;
      const res = await fetchAPI({ action: 'delete_user', target_user: user });
      if (res) {
        loadUsers();
      }
    }
  </script>
</body>
</html>
