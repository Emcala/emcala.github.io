<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EMCALA · Cobertura CVZA</title>
  <meta name="description" content="Seguimiento de cobertura de cerveza por promotor - EMCALA">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- Top Nav Bar (Estilo Planificador) -->
  <nav class="top-nav">
    <div class="nav-left">
      <div class="nav-brand">
        <span class="brand-emcala">EMCALA</span>
        <span class="brand-divider">|</span>
        <span class="brand-app">Cobertura CVZA</span>
      </div>
      
      <!-- Home Button -->
      <a href="../portal/index.html" class="nav-icon-btn" title="Volver al Portal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </a>

      <!-- Logout Button -->
      <button id="logoutBtn" class="nav-icon-btn btn-logout" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
          <line x1="12" y1="2" x2="12" y2="12"></line>
        </svg>
      </button>
    </div>

    <div class="nav-right">
      <button class="nav-btn btn-refresh" id="btnRefresh" title="Traer datos frescos ahora">
        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        ACTUALIZAR DATOS
      </button>
    </div>
  </nav>

  <!-- Status Badges Row -->
  <div class="header-status-container">
    <div class="status-bar" id="statusBar">
      <div class="status-item">
        <span class="status-dot pending" id="statusMaestro"></span>
        <span id="statusMaestroText">MAESTRO</span>
      </div>
      <div class="status-item">
        <span class="status-dot pending" id="statusMesas"></span>
        <span id="statusMesasText">MESAS</span>
      </div>
      <div class="status-item">
        <span class="status-dot pending" id="statusVentas"></span>
        <span id="statusVentasText">AVANCE</span>
      </div>
      <div class="status-item">
        <span class="status-dot pending" id="statusHistoricos"></span>
        <span id="statusHistoricosText">HISTÓRICOS</span>
      </div>
    </div>
    <div class="dias-info" id="diasInfo" style="display:none"></div>
  </div>

  <!-- Main Table -->
  <div class="table-container" id="tableContainer">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🍺</div>
      <div class="empty-state-text">Sincronizando datos...</div>
      <div class="empty-state-hint">Las Mesas, la Cartera y el Avance (CCC) se cargan automáticamente desde la nube</div>
    </div>
    <div class="table-scroll" id="tableScroll" style="display:none">
      <table id="mainTable">
        <thead>
          <tr>
            <th>PROMOTOR</th>
            <th>Cartera de<br>Clientes</th>
            <th>CCC</th>
            <th>CNC</th>
            <th>AVANCE</th>
            <th>CCC<br>MA</th>
            <th>CCC<br>MM AA</th>
            <th>Media<br>Necesaria</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div style="text-align:center">
      <div class="loading-spinner"></div>
      <div style="margin-top:14px;font-weight:600;font-size:13px" id="loadingText">Procesando...</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="../emcala-auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
